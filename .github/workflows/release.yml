name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "릴리즈 버전 태그 (예: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      release_sha: ${{ steps.release_sha.outputs.value }}
      cargo_version: ${{ steps.cargo_version.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Ensure tag does not already exist
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"

          if git rev-parse "refs/tags/$version" >/dev/null 2>&1; then
            echo "Tag already exists: $version" >&2
            exit 1
          fi

      - name: Update Cargo version
        shell: bash
        run: |
          set -euo pipefail
          cargo run --bin prepare-release-version -- "${{ inputs.version }}"
          cargo generate-lockfile

      - name: Read Cargo version
        id: cargo_version
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["package"]["version"])')"
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Commit release version update
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- Cargo.toml Cargo.lock; then
            echo "Cargo version is already up to date"
            exit 0
          fi

          git add Cargo.toml Cargo.lock
          git commit -m "chore: 릴리즈 버전 ${{ steps.cargo_version.outputs.value }} 반영"
          git push origin HEAD

      - name: Capture release SHA
        id: release_sha
        shell: bash
        run: |
          set -euo pipefail
          echo "value=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    name: Build windows-x64
    runs-on: windows-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release

      - name: Create release archive
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          $archiveDir = "dist/windows-x64"
          $archivePath = "dist/oshit-$version-windows-x64.zip"

          New-Item -ItemType Directory -Force -Path $archiveDir | Out-Null
          Copy-Item "target/release/oshit.exe" -Destination $archiveDir
          Compress-Archive -Path "$archiveDir/*" -DestinationPath $archivePath -Force

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist/oshit-${{ inputs.version }}-windows-x64.zip
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.release_sha }}

      - name: Download archives
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh run download "${{ github.run_id }}" --dir release-assets

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          previous_tag="$(git tag --sort=-creatordate | head -n 1 || true)"

          {
            echo "# ${version}"
            echo
            if [ -n "$previous_tag" ]; then
              echo "## Changes since ${previous_tag}"
              echo
              git log --oneline "${previous_tag}..HEAD"
            else
              echo "## Changes"
              echo
              git log --oneline
            fi
          } > RELEASE_NOTES.md

      - name: Create tag
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          git tag "$version" "${{ needs.prepare.outputs.release_sha }}"
          git push origin "$version"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          assets=(release-assets/*/*.zip)

          gh release create "${{ inputs.version }}" \
            "${assets[@]}" \
            --title "${{ inputs.version }}" \
            --notes-file RELEASE_NOTES.md
